server:
  port: 8082

spring:
  application:
    name: settlement-worker
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # PC1에서 개발/로컬 실행 시 127.0.0.1. PC3에 배포하면 PC1의 LAN IP(192.168.0.5)로
    # 바꿔야 한다 — MySQL이 원격 접속을 허용하도록 bind-address/사용자 권한 사전 확인 필요.
    url: jdbc:mysql://127.0.0.1:3306/core2_spa?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 1234
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc.batch_size: 100
  rabbitmq:
    host: 192.168.0.6
    port: 5672
    username: coreapp
    password: 1234
    virtual-host: core_vhost
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        # Phase 4: manual ack — 실제 acknowledge mode는 RabbitMqConfig의
        # rabbitListenerContainerFactory 빈이 결정한다(MANUAL 고정).
        acknowledge-mode: manual

management:
  endpoints:
    web:
      exposure:
        include: health
